# Workflow to check installer runs ok

name: Installer

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  install:
    name: Install on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Run 0xMF-dotfiles install script
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            # Ignore errors when running installer on Windows (e.g. due to symlink permission restrictions)
            ./bin/0xMF-dotfiles install || true
          else
            ./bin/0xMF-dotfiles install
          fi
